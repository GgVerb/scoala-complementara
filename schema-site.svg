<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .page-box { fill: #e8f5e8; stroke: #2d5d2d; stroke-width: 2; }
      .section-box { fill: #fff8dc; stroke: #d2691e; stroke-width: 1; }
      .article-box { fill: #f0f8ff; stroke: #4682b4; stroke-width: 1; }
      .special-article-box { fill: #ffe4e1; stroke: #cd5c5c; stroke-width: 1; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .link-line { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .section-link-line { stroke: #d2691e; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <marker id="arrowhead-nav" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <marker id="arrowhead-header" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" class="title-text" font-size="20">Schema Site - Școala Complementară</text>
  
  <!-- HOME PAGE (/) -->
  <rect x="450" y="60" width="300" height="50" class="page-box" rx="5"/>
  <text x="600" y="90" class="title-text">home (/)</text>
  
  <!-- HOME PAGE SECTIONS -->
  <!-- Hero Section -->
  <rect x="50" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="110" y="175" class="text">hero-section</text>
  
  <!-- About Section -->
  <rect x="190" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="250" y="175" class="text">about-section</text>
  
  <!-- Gallery Section -->
  <rect x="330" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="390" y="175" class="text">gallery-section</text>
  
  <!-- Audience Section -->
  <rect x="470" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="530" y="175" class="text">audience-section</text>
  
  <!-- Newsletter Section -->
  <rect x="610" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="670" y="175" class="text">newsletter-section</text>
  
  <!-- Blog Section -->
  <rect x="750" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="810" y="175" class="text">blog-section</text>
  
  <!-- Contact Section -->
  <rect x="890" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="950" y="175" class="text">contact-section</text>
  
  <!-- Footer -->
  <rect x="1030" y="150" width="120" height="40" class="section-box" rx="3"/>
  <text x="1090" y="175" class="text">footer</text>
  
  <!-- Lines from HOME to sections -->
  <line x1="600" y1="110" x2="110" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="250" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="390" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="530" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="670" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="810" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="950" y2="150" class="section-link-line"/>
  <line x1="600" y1="110" x2="1090" y2="150" class="section-link-line"/>
  
  <!-- MAIN PAGES -->
  <!-- Pentru Elevi -->
  <rect x="50" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="125" y="275" class="text">pentru-elevi</text>
  
  <!-- Pentru Adulti -->
  <rect x="220" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="295" y="275" class="text">pentru-adulti</text>
  
  <!-- Pentru Institutii -->
  <rect x="390" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="465" y="275" class="text">pentru-institutii</text>
  
  <!-- Pentru Mentori -->
  <rect x="560" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="635" y="275" class="text">pentru-mentori</text>
  
  <!-- Despre Noi -->
  <rect x="730" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="805" y="275" class="text">despre-noi</text>
  
  <!-- Articole -->
  <rect x="900" y="250" width="150" height="40" class="page-box" rx="5"/>
  <text x="975" y="275" class="text">articole</text>
  
  <!-- Links from audience-section to target pages -->
  <line x1="530" y1="190" x2="125" y2="250" class="link-line"/>
  <line x1="530" y1="190" x2="295" y2="250" class="link-line"/>
  <line x1="530" y1="190" x2="465" y2="250" class="link-line"/>
  <line x1="530" y1="190" x2="635" y2="250" class="link-line"/>
  
  <!-- Link from blog-section to articole -->
  <line x1="810" y1="190" x2="975" y2="250" class="link-line"/>
  
  <!-- Links from pentru-institutii and pentru-mentori to despre-noi -->
  <line x1="465" y1="290" x2="805" y2="250" class="link-line"/>
  <line x1="635" y1="290" x2="805" y2="250" class="link-line"/>
  
  <!-- HEADER NAVIGATION LINKS (Înapoi acasă) -->
  <!-- From pentru-elevi to home -->
  <line x1="125" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <!-- From pentru-adulti to home -->
  <line x1="295" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <!-- From pentru-institutii to home -->
  <line x1="465" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <!-- From pentru-mentori to home -->
  <line x1="635" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <!-- From despre-noi to home -->
  <line x1="805" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <!-- From articole to home -->
  <line x1="975" y1="250" x2="600" y2="110" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  
  <!-- ARTICLES (accessible from /articole) -->
  <text x="600" y="350" class="title-text">Articole (din /articole)</text>
  
  <!-- Regular Articles Row 1 -->
  <rect x="50" y="380" width="180" height="35" class="article-box" rx="3"/>
  <text x="140" y="402" class="text" font-size="10">ghidul-educatie-inovatoare</text>
  
  <rect x="250" y="380" width="180" height="35" class="article-box" rx="3"/>
  <text x="340" y="402" class="text" font-size="10">scoala-in-padure</text>
  
  <rect x="450" y="380" width="180" height="35" class="article-box" rx="3"/>
  <text x="540" y="402" class="text" font-size="10">scolile-democratice</text>
  
  <!-- Regular Articles Row 2 -->
  <rect x="50" y="440" width="180" height="35" class="article-box" rx="3"/>
  <text x="140" y="462" class="text" font-size="10">outward-bound-experimente</text>
  
  <rect x="250" y="440" width="180" height="35" class="article-box" rx="3"/>
  <text x="340" y="462" class="text" font-size="10">educatie-experientiala</text>
  
  <rect x="450" y="440" width="180" height="35" class="article-box" rx="3"/>
  <text x="540" y="462" class="text" font-size="10">natura-ca-profesor</text>
  
  <!-- Regular Articles Row 3 -->
  <rect x="50" y="500" width="180" height="35" class="article-box" rx="3"/>
  <text x="140" y="522" class="text" font-size="10">abilitati-complementare</text>
  
  <rect x="250" y="500" width="180" height="35" class="article-box" rx="3"/>
  <text x="340" y="522" class="text" font-size="10">einstein-problema</text>
  
  <rect x="450" y="500" width="180" height="35" class="article-box" rx="3"/>
  <text x="540" y="522" class="text" font-size="10">curriculum-propunere</text>
  
  <!-- Links from articole page to articles -->
  <line x1="975" y1="290" x2="140" y2="380" class="link-line"/>
  <line x1="975" y1="290" x2="340" y2="380" class="link-line"/>
  <line x1="975" y1="290" x2="540" y2="380" class="link-line"/>
  <line x1="975" y1="290" x2="140" y2="440" class="link-line"/>
  <line x1="975" y1="290" x2="340" y2="440" class="link-line"/>
  <line x1="975" y1="290" x2="540" y2="440" class="link-line"/>
  <line x1="975" y1="290" x2="140" y2="500" class="link-line"/>
  <line x1="975" y1="290" x2="340" y2="500" class="link-line"/>
  <line x1="975" y1="290" x2="540" y2="500" class="link-line"/>
  
  <!-- Links from articles back to articole page (bidirectional) -->
  <g stroke="#4682b4" stroke-width="1" fill="none" stroke-dasharray="2,2">
    <line x1="140" y1="415" x2="975" y2="290"/>
    <line x1="340" y1="415" x2="975" y2="290"/>
    <line x1="540" y1="415" x2="975" y2="290"/>
    <line x1="140" y1="475" x2="975" y2="290"/>
    <line x1="340" y1="475" x2="975" y2="290"/>
    <line x1="540" y1="475" x2="975" y2="290"/>
    <line x1="140" y1="535" x2="975" y2="290"/>
    <line x1="340" y1="535" x2="975" y2="290"/>
    <line x1="540" y1="535" x2="975" y2="290"/>
  </g>
  
  <!-- SPECIAL ARTICLES (not in main list) -->
  <text x="600" y="590" class="title-text">Articole speciale</text>
  
  <!-- Special Articles -->
  <rect x="350" y="620" width="180" height="35" class="special-article-box" rx="3"/>
  <text x="440" y="642" class="text" font-size="10">voluntarii</text>
  
  <rect x="550" y="620" width="180" height="35" class="special-article-box" rx="3"/>
  <text x="640" y="642" class="text" font-size="10">de-ce-eu</text>
  
  <!-- Link from despre-noi to voluntarii -->
  <line x1="805" y1="290" x2="440" y2="620" class="link-line"/>
  
  <!-- Link from despre-noi to de-ce-eu -->
  <line x1="805" y1="290" x2="640" y2="620" class="link-line"/>
  
  <!-- ARTICLE NAVIGATION -->
  <text x="600" y="710" class="title-text">Navigare între articole (precedent/următor)</text>
  
  <!-- Article navigation connections (previous/next) - sequential order -->
  <g stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,3">
    <!-- ghidul -> scoala-in-padure -->
    <path d="M 230 397 Q 280 390 250 397" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- scoala-in-padure -> scolile-democratice -->
    <path d="M 430 397 Q 460 390 450 397" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- scolile-democratice -> outward-bound -->
    <path d="M 540 415 Q 485 430 140 440" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- outward-bound -> educatie-experientiala -->
    <path d="M 230 457 Q 280 450 250 457" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- educatie-experientiala -> natura-ca-profesor -->
    <path d="M 430 457 Q 460 450 450 457" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- natura-ca-profesor -> abilitati-complementare -->
    <path d="M 540 475 Q 485 490 140 500" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- abilitati-complementare -> einstein-problema -->
    <path d="M 230 517 Q 280 510 250 517" stroke="#999" marker-end="url(#arrowhead-nav)"/>
    <!-- einstein-problema -> curriculum-propunere -->
    <path d="M 430 517 Q 460 510 450 517" stroke="#999" marker-end="url(#arrowhead-nav)"/>
  </g>
  
  <!-- 404 Page -->
  <rect x="50" y="780" width="150" height="40" class="page-box" rx="5"/>
  <text x="125" y="805" class="text">not-found</text>
  
  <!-- ROUTING STRUCTURE -->
  <text x="600" y="870" class="title-text">Structura rutelor</text>
  
  <g font-family="monospace" font-size="11">
    <text x="50" y="900">/ → home</text>
    <text x="200" y="900">/pentru-elevi → pentru-elevi</text>
    <text x="400" y="900">/pentru-adulti → pentru-adulti</text>
    <text x="600" y="900">/pentru-institutii → pentru-institutii</text>
    <text x="50" y="920">/pentru-mentori → pentru-mentori</text>
    <text x="250" y="920">/despre-noi → despre-noi</text>
    <text x="450" y="920">/articole → articole</text>
    <text x="50" y="940">/articol/:id → articol (dinamic)</text>
    <text x="300" y="940">* → not-found</text>
  </g>
  
  <!-- LEGEND -->
  <text x="600" y="1000" class="title-text">Legendă</text>
  
  <rect x="200" y="1020" width="30" height="20" class="page-box" rx="3"/>
  <text x="240" y="1035" class="text" text-anchor="start">Pagini principale</text>
  
  <rect x="200" y="1050" width="30" height="20" class="section-box" rx="3"/>
  <text x="240" y="1065" class="text" text-anchor="start">Secțiuni din pagina principală</text>
  
  <rect x="200" y="1080" width="30" height="20" class="article-box" rx="3"/>
  <text x="240" y="1095" class="text" text-anchor="start">Articole normale (în listă)</text>
  
  <rect x="200" y="1110" width="30" height="20" class="special-article-box" rx="3"/>
  <text x="240" y="1125" class="text" text-anchor="start">Articole speciale (acces direct)</text>
  
  <line x1="200" y1="1150" x2="230" y2="1150" class="link-line"/>
  <text x="240" y="1155" class="text" text-anchor="start">Link direct</text>
  
  <line x1="200" y1="1170" x2="230" y2="1170" class="section-link-line"/>
  <text x="240" y="1175" class="text" text-anchor="start">Include secțiune</text>
  
  <line x1="200" y1="1190" x2="230" y2="1190" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="240" y="1195" class="text" text-anchor="start">Navigare între articole (precedent/următor)</text>
  
  <line x1="200" y1="1210" x2="230" y2="1210" stroke="#4682b4" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
  <text x="240" y="1215" class="text" text-anchor="start">Link înapoi la pagina articole</text>
  
  <line x1="200" y1="1230" x2="230" y2="1230" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-header)"/>
  <text x="240" y="1235" class="text" text-anchor="start">Link header "Înapoi acasă"</text>
  
  <!-- NOTES -->
  <text x="50" y="1270" class="text" text-anchor="start" font-size="10">Note:</text>
  <text x="50" y="1290" class="text" text-anchor="start" font-size="10">• Paginile de articole nu au header navigation</text>
  <text x="50" y="1305" class="text" text-anchor="start" font-size="10">• "voluntarii" și "de-ce-eu" sunt accesibile din despre-noi</text>
  <text x="50" y="1320" class="text" text-anchor="start" font-size="10">• pentru-institutii și pentru-mentori au linkuri către despre-noi</text>
  <text x="50" y="1335" class="text" text-anchor="start" font-size="10">• Toate paginile principale au link "Înapoi acasă" în header</text>
  <text x="50" y="1350" class="text" text-anchor="start" font-size="10">• Toate articolele normale au navigare precedent/următor și link către articole</text>
  <text x="50" y="1365" class="text" text-anchor="start" font-size="10">• Footer este prezent pe toate paginile</text>
</svg>